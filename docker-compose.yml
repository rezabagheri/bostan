services:

  # --- Reverse Proxy -----------------------------------------------------------
  proxy:
    image: nginxproxy/nginx-proxy:latest
    container_name: pdev-proxy
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - pdev

  # --- Database ----------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: pdev-db
    restart: unless-stopped
    platform: linux/arm64/v8
    command: --require-secure-transport=OFF
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: pdev
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    networks:
      - pdev
    volumes:
      - db_data:/var/lib/mysql

  # --- Adminer -----------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: pdev-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      VIRTUAL_HOST: adminer.test
      VIRTUAL_PORT: 8080
    depends_on:
      - db
    networks:
      - pdev

  # --- Mailpit -----------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: pdev-mailpit
    restart: unless-stopped
    ports:
      - "8027:8025"
      - "1026:1025"
    networks:
      - pdev

  paradisecyber:
    image: wordpress:latest
    container_name: paradisecyber
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: pdev_paradisecyber
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      VIRTUAL_HOST: paradisecyber.test
      VIRTUAL_PORT: 80
    volumes:
      - paradisecyber_data:/var/www/html
    networks:
      - pdev
    labels:
      pdev.port: "8091"
# [SITES_MARKER]

networks:
  pdev:
    name: pdev

volumes:
  db_data:
  paradisecyber_data:
# [VOLUMES_MARKER]